name: Generate profile assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify PROFILE_TOKEN is configured
        env:
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: |
          if [ -z "$PROFILE_TOKEN" ]; then
            echo "PROFILE_TOKEN is required for private + public GitHub stats."
            echo "Create a classic token with repo and read:user scopes, then save it as a repository secret named PROFILE_TOKEN."
            exit 1
          fi

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.PROFILE_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate accurate GitHub metrics
        uses: actions/github-script@v7
        env:
          PROFILE_LOGIN: ${{ github.repository_owner }}
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        with:
          github-token: ${{ secrets.PROFILE_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");

            const login = process.env.PROFILE_LOGIN;
            const now = new Date();

            const identity = await github.graphql(
              `query($login: String!) {
                user(login: $login) {
                  id
                  name
                  login
                  createdAt
                  followers { totalCount }
                  following { totalCount }
                }
              }`,
              { login }
            );

            const repoQuery = `
              query($login: String!, $authorId: ID!, $privacy: RepositoryPrivacy!, $cursor: String) {
                user(login: $login) {
                  repositories(
                    first: 100,
                    after: $cursor,
                    ownerAffiliations: OWNER,
                    isFork: false,
                    privacy: $privacy,
                    orderBy: { field: UPDATED_AT, direction: DESC }
                  ) {
                    totalCount
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                    nodes {
                      name
                      url
                      stargazerCount
                      forkCount
                      updatedAt
                      primaryLanguage {
                        name
                        color
                      }
                      defaultBranchRef {
                        target {
                          ... on Commit {
                            history(author: { id: $authorId }) {
                              totalCount
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            async function fetchRepos(privacy) {
              const repos = [];
              let totalCount = 0;
              let cursor = null;

              do {
                const page = await github.graphql(repoQuery, {
                  login,
                  authorId: identity.user.id,
                  privacy,
                  cursor
                });

                const connection = page.user.repositories;
                totalCount = connection.totalCount;
                repos.push(...connection.nodes);
                cursor = connection.pageInfo.hasNextPage ? connection.pageInfo.endCursor : null;
              } while (cursor);

              return { totalCount, repos };
            }

            const user = identity.user;
            const [publicResult, privateResult] = await Promise.all([
              fetchRepos("PUBLIC"),
              fetchRepos("PRIVATE")
            ]);

            const publicRepos = publicResult.repos;
            const privateRepos = privateResult.repos;
            const publicRepoCount = publicResult.totalCount;
            const privateRepoCount = privateResult.totalCount;
            const totalRepoCount = publicRepoCount + privateRepoCount;
            const stars = publicRepos.reduce((sum, repo) => sum + repo.stargazerCount, 0);
            const forks = publicRepos.reduce((sum, repo) => sum + repo.forkCount, 0);
            const commitCount = (repo) => repo.defaultBranchRef?.target?.history?.totalCount || 0;
            const publicDefaultBranchCommits = publicRepos.reduce((sum, repo) => sum + commitCount(repo), 0);
            const privateDefaultBranchCommits = privateRepos.reduce((sum, repo) => sum + commitCount(repo), 0);
            const defaultBranchCommits = publicDefaultBranchCommits + privateDefaultBranchCommits;
            const recentRepos = publicRepos.slice(0, 4);

            // Total Actions workflow runs across every owned repo. This is the
            // only stat that still needs the REST API; commit/PR/issue counts now
            // come from GitHub's own contribution data (reliable + consistent).
            async function countWorkflowRuns(repos) {
              let runs = 0;
              for (const repo of repos) {
                try {
                  const workflowRuns = await github.rest.actions.listWorkflowRunsForRepo({
                    owner: login,
                    repo: repo.name,
                    per_page: 1
                  });
                  runs += workflowRuns.data.total_count || 0;
                } catch (error) {
                  core.warning(`Could not count Actions workflow runs for one repository: ${error.message}`);
                }
              }
              return runs;
            }

            const [publicWorkflowRuns, privateWorkflowRuns] = await Promise.all([
              countWorkflowRuns(publicRepos),
              countWorkflowRuns(privateRepos)
            ]);
            const actionsWorkflowRuns = publicWorkflowRuns + privateWorkflowRuns;

            // PR / issue / review totals via the search API. The contributions
            // collection only counts these inside the contribution window and
            // badly undercounts (e.g. 28 PRs vs 162 actual), so search the real
            // totals across every repo the token can see (public + private).
            async function searchCount(q) {
              try {
                const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 1 });
                return res.data.total_count || 0;
              } catch (error) {
                core.warning(`Could not run search "${q}": ${error.message}`);
                return 0;
              }
            }

            const [pullRequestsAuthored, pullRequestsMerged, issuesAuthored, reviewsGiven] =
              await Promise.all([
                searchCount(`is:pr author:${login}`),
                searchCount(`is:pr author:${login} is:merged`),
                searchCount(`is:issue author:${login}`),
                searchCount(`is:pr reviewed-by:${login}`)
              ]);

            // Calendar-year contribution totals straight from GitHub's own
            // contribution calendar (the same numbers shown on the profile).
            // Requires "Include private contributions on my profile" so private
            // squares are counted; repository names are never exposed by this API.
            const calendarYearQuery = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            async function fetchCalendarYears(createdAt) {
              const startYear = new Date(createdAt).getUTCFullYear();
              const endYear = now.getUTCFullYear();
              const years = [];
              const days = [];

              for (let year = startYear; year <= endYear; year++) {
                const from = new Date(Date.UTC(year, 0, 1, 0, 0, 0));
                const toRaw = new Date(Date.UTC(year, 11, 31, 23, 59, 59));
                const to = toRaw < now ? toRaw : now;

                try {
                  const data = await github.graphql(calendarYearQuery, {
                    login,
                    from: from.toISOString(),
                    to: to.toISOString()
                  });
                  const cal = data.user.contributionsCollection.contributionCalendar;
                  years.push({ year, count: cal.totalContributions });
                  for (const week of cal.weeks) {
                    for (const day of week.contributionDays) {
                      days.push({ date: day.date, count: day.contributionCount });
                    }
                  }
                } catch (error) {
                  core.warning(`Could not fetch contribution calendar year ${year}: ${error.message}`);
                  years.push({ year, count: 0 });
                }
              }

              return { years, days };
            }

            const { years: calendarYears, days: calendarDays } = await fetchCalendarYears(user.createdAt);
            const dynamicContributionTotal = calendarYears
              .reduce((sum, item) => sum + item.count, 0);
            const contributionYearLabel = [...calendarYears]
              .sort((a, b) => b.year - a.year)
              .map(({ year, count }) => `${year}: ${count}`)
              .join(" | ");

            const languageMap = new Map();
            for (const repo of [...publicRepos, ...privateRepos]) {
              if (!repo.primaryLanguage) continue;
              const current = languageMap.get(repo.primaryLanguage.name) || {
                name: repo.primaryLanguage.name,
                color: repo.primaryLanguage.color || "#2DD4BF",
                count: 0
              };
              current.count += 1;
              languageMap.set(repo.primaryLanguage.name, current);
            }

            const languages = [...languageMap.values()]
              .sort((a, b) => b.count - a.count)
              .slice(0, 6);

            const escapeXml = (value) => String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;");

            const statCard = (x, y, label, value, accent) => `
              <rect x="${x}" y="${y}" width="172" height="82" rx="16" fill="#111827" stroke="${accent}" stroke-opacity="0.45"/>
              <text x="${x + 18}" y="${y + 32}" fill="#94A3B8" font-size="13" font-weight="600">${label}</text>
              <text x="${x + 18}" y="${y + 62}" fill="#E6EDF3" font-size="28" font-weight="800">${value}</text>
            `;

            const repoRows = recentRepos.map((repo, index) => {
              const y = 384 + index * 34;
              const lang = repo.primaryLanguage ? repo.primaryLanguage.name : "Code";
              const color = repo.primaryLanguage ? repo.primaryLanguage.color : "#2DD4BF";
              return `
                <g>
                  <circle cx="458" cy="${y - 4}" r="5" fill="${color || "#2DD4BF"}"/>
                  <text x="472" y="${y}" fill="#E6EDF3" font-size="14" font-weight="700">${escapeXml(repo.name)}</text>
                  <text x="650" y="${y}" fill="#94A3B8" font-size="12">${escapeXml(lang)}</text>
                  <text x="735" y="${y}" fill="#F6C85F" font-size="12">stars ${repo.stargazerCount}</text>
                </g>
              `;
            }).join("");

            const languageRows = languages.map((language, index) => {
              const total = languages.reduce((sum, item) => sum + item.count, 0) || 1;
              const percent = Math.round((language.count / total) * 100);
              const y = 370 + index * 31;
              return `
                <g>
                  <text x="56" y="${y}" fill="#E6EDF3" font-size="14" font-weight="700">${escapeXml(language.name)}</text>
                  <text x="202" y="${y}" fill="#94A3B8" font-size="12">${percent}%</text>
                  <rect x="250" y="${y - 12}" width="130" height="10" rx="5" fill="#1F2937"/>
                  <rect x="250" y="${y - 12}" width="${Math.max(8, Math.round(130 * percent / 100))}" height="10" rx="5" fill="${language.color}"/>
                </g>
              `;
            }).join("");

            const svg = `<?xml version="1.0" encoding="UTF-8"?>
            <svg width="900" height="820" viewBox="0 0 900 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
              <title id="title">${escapeXml(login)} GitHub metrics</title>
              <desc id="desc">Dynamic GitHub metrics generated from the GitHub API.</desc>
              <defs>
                <linearGradient id="border" x1="0" y1="0" x2="900" y2="820" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#F6C85F"/>
                  <stop offset="0.52" stop-color="#2DD4BF"/>
                  <stop offset="1" stop-color="#8B5CF6"/>
                </linearGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
                </filter>
              </defs>
              <rect width="900" height="820" rx="28" fill="#0D1117"/>
              <rect x="1" y="1" width="898" height="818" rx="27" stroke="url(#border)" stroke-width="2"/>
              <g filter="url(#shadow)">
                <rect x="34" y="34" width="832" height="752" rx="24" fill="#0B1020" stroke="#1F2937"/>
              </g>
              <text x="56" y="86" fill="#F6C85F" font-size="30" font-weight="900">${escapeXml(user.name || login)}</text>
              <text x="56" y="116" fill="#94A3B8" font-size="15">@${escapeXml(login)} - Live GitHub analytics - Updated by GitHub Actions</text>

              ${statCard(56, 152, "Total Repos", totalRepoCount, "#F6C85F")}
              ${statCard(246, 152, "Public Repos", publicRepoCount, "#2DD4BF")}
              ${statCard(436, 152, "Private Repos", privateRepoCount, "#8B5CF6")}
              ${statCard(626, 152, "Total Contributions", dynamicContributionTotal, "#2DD4BF")}

              ${statCard(56, 250, "Total Commits", defaultBranchCommits, "#F6C85F")}
              ${statCard(246, 250, "Public Commits", publicDefaultBranchCommits, "#2DD4BF")}
              ${statCard(436, 250, "Private Commits", privateDefaultBranchCommits, "#8B5CF6")}
              ${statCard(626, 250, "Pull Requests", pullRequestsAuthored, "#F6C85F")}

              ${statCard(56, 348, "PRs Merged", pullRequestsMerged, "#8B5CF6")}
              ${statCard(246, 348, "Code Reviews", reviewsGiven, "#2DD4BF")}
              ${statCard(436, 348, "Actions Runs", actionsWorkflowRuns, "#F6C85F")}
              ${statCard(626, 348, "Issues Opened", issuesAuthored, "#2DD4BF")}

              ${statCard(56, 446, "Followers", user.followers.totalCount, "#2DD4BF")}
              ${statCard(246, 446, "Following", user.following.totalCount, "#8B5CF6")}
              ${statCard(436, 446, "Public Stars", stars, "#F6C85F")}
              ${statCard(626, 446, "Public Forks", forks, "#2DD4BF")}

              <text x="56" y="548" fill="#F6C85F" font-size="19" font-weight="900">Primary Languages Across Public + Private</text>
              <g transform="translate(0 218)">
                ${languageRows || `<text x="56" y="370" fill="#94A3B8" font-size="14">No primary languages detected yet.</text>`}
              </g>

              <text x="456" y="548" fill="#F6C85F" font-size="19" font-weight="900">Recently Updated Public Repos</text>
              <g transform="translate(0 218)">
                ${repoRows || `<text x="456" y="370" fill="#94A3B8" font-size="14">No public repositories found yet.</text>`}
              </g>

              <text x="56" y="758" fill="#64748B" font-size="12">Dynamic profile years: ${escapeXml(contributionYearLabel)}. Private repo names are never shown.</text>
              <text x="56" y="776" fill="#64748B" font-size="12">Commit, PR, issue, and contribution totals come from GitHub's own data across public and private repos, without rendering private repo names.</text>
            </svg>`;

            fs.mkdirSync("dist", { recursive: true });
            fs.writeFileSync(path.join("dist", "github-metrics.svg"), svg.trim());

            // ---- Full-history contribution graph (account start year -> now) ----
            // Monthly contributions across every year since the account was
            // created. Leading empty months are trimmed and a square-root y-scale
            // lifts the smaller years so the curve is readable instead of a long
            // flat gap. All values are dynamic; nothing is hardcoded.
            const startYear = new Date(user.createdAt).getUTCFullYear();
            const endYear = now.getUTCFullYear();
            const monthMap = new Map();
            for (const day of calendarDays) {
              const key = day.date.slice(0, 7);
              monthMap.set(key, (monthMap.get(key) || 0) + day.count);
            }

            let months = [];
            {
              let y = startYear;
              let m = 0;
              const endM = now.getUTCMonth();
              while (y < endYear || (y === endYear && m <= endM)) {
                const key = `${y}-${String(m + 1).padStart(2, "0")}`;
                months.push({ key, count: monthMap.get(key) || 0, y, m });
                m += 1;
                if (m > 11) { m = 0; y += 1; }
              }
            }
            const firstActive = months.findIndex((item) => item.count > 0);
            if (firstActive > 0) months = months.slice(firstActive);

            const GW = 900, GH = 320;
            const gPadL = 52, gPadR = 28, gPadT = 70, gPadB = 50;
            const plotW = GW - gPadL - gPadR;
            const plotH = GH - gPadT - gPadB;
            const baseY = gPadT + plotH;
            const maxCount = Math.max(1, ...months.map((item) => item.count));
            const sq = (v) => Math.sqrt(Math.max(0, v));
            const sqMax = sq(maxCount);
            const nMonths = months.length;
            const xAt = (i) => gPadL + (nMonths <= 1 ? plotW / 2 : (i / (nMonths - 1)) * plotW);
            const yAt = (c) => baseY - (sq(c) / sqMax) * plotH;

            const ySteps = 4;
            let gridLines = "";
            for (let i = 0; i <= ySteps; i++) {
              const frac = i / ySteps;
              const val = Math.round(maxCount * frac * frac);
              const yy = baseY - frac * plotH;
              gridLines += `<line x1="${gPadL}" y1="${yy.toFixed(1)}" x2="${GW - gPadR}" y2="${yy.toFixed(1)}" stroke="#1F2937" stroke-width="1"/>`
                + `<text x="${gPadL - 9}" y="${(yy + 4).toFixed(1)}" fill="#64748B" font-size="11" text-anchor="end">${val}</text>`;
            }

            const linePoints = months.map((item, i) => [xAt(i), yAt(item.count)]);
            const linePath = linePoints
              .map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`)
              .join(" ");
            const areaPath = `${linePath} L${xAt(nMonths - 1).toFixed(1)},${baseY.toFixed(1)} L${xAt(0).toFixed(1)},${baseY.toFixed(1)} Z`;

            let xLabels = "";
            months.forEach((item, i) => {
              if (item.m === 0 || i === 0) {
                xLabels += `<text x="${xAt(i).toFixed(1)}" y="${(baseY + 24).toFixed(1)}" fill="#94A3B8" font-size="12" font-weight="700" text-anchor="middle">${item.y}</text>`;
              }
            });

            const graphYearLabel = [...calendarYears]
              .sort((a, b) => b.year - a.year)
              .map(({ year, count }) => `${year}: ${count.toLocaleString("en-US")}`)
              .join("   |   ");
            const dots = linePoints
              .map((p) => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.2" fill="#2DD4BF"/>`)
              .join("");

            const graphSvg = `<?xml version="1.0" encoding="UTF-8"?>
            <svg width="${GW}" height="${GH}" viewBox="0 0 ${GW} ${GH}" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Contribution history">
              <defs>
                <linearGradient id="graphArea" x1="0" y1="${gPadT}" x2="0" y2="${baseY}" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#F6C85F" stop-opacity="0.55"/>
                  <stop offset="1" stop-color="#F6C85F" stop-opacity="0.03"/>
                </linearGradient>
                <linearGradient id="graphBorder" x1="0" y1="0" x2="${GW}" y2="${GH}" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#F6C85F"/>
                  <stop offset="0.52" stop-color="#2DD4BF"/>
                  <stop offset="1" stop-color="#8B5CF6"/>
                </linearGradient>
              </defs>
              <rect width="${GW}" height="${GH}" rx="20" fill="#0D1117"/>
              <rect x="1" y="1" width="${GW - 2}" height="${GH - 2}" rx="19" stroke="url(#graphBorder)" stroke-width="2" stroke-opacity="0.7"/>
              <text x="${gPadL}" y="34" fill="#F6C85F" font-size="20" font-weight="900">Contribution History - ${startYear} to ${endYear}</text>
              <text x="${gPadL}" y="55" fill="#94A3B8" font-size="12.5">${escapeXml(graphYearLabel)}   ·   Total: ${dynamicContributionTotal.toLocaleString("en-US")}</text>
              ${gridLines}
              <path d="${areaPath}" fill="url(#graphArea)"/>
              <path d="${linePath}" fill="none" stroke="#F6C85F" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
              ${dots}
              ${xLabels}
              <text x="${GW - gPadR}" y="${(gPadT - 14).toFixed(1)}" fill="#475569" font-size="10.5" text-anchor="end">monthly · sqrt scale</text>
            </svg>`;

            fs.writeFileSync(path.join("dist", "github-contribution-graph.svg"), graphSvg.trim());

      - name: Publish generated assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main for README cache bump
        uses: actions/checkout@v4
        with:
          ref: main
          path: profile-main
          token: ${{ secrets.PROFILE_TOKEN }}

      - name: Bump README asset cache keys
        working-directory: profile-main
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = "README.md";
          const cacheKey = `v=${process.env.GITHUB_RUN_ID}`;
          const before = fs.readFileSync(path, "utf8");
          const after = before.replace(
            /(github-(?:metrics|contribution-graph|contribution-grid-snake(?:-dark)?)\.svg)\?v=[^"'\s)]+/g,
            `$1?${cacheKey}`
          );

          if (after !== before) {
            fs.writeFileSync(path, after);
          }
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README cache keys are already current."
            exit 0
          fi
          git commit -m "Bump profile asset cache"
          git push origin HEAD:main
